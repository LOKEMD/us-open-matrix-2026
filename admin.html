<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Entries — Majors Pool (admin)</title>
<style>
  :root{--navy:#0a2342;--navy2:#143a66;--ink:#0d1b2a;--paper:#f4f6f9;--card:#fff;--line:#e2e8f0;--muted:#64748b;--green:#1a7f4b;--red:#c0392b;--gold:#c9a227;--shadow:0 1px 3px rgba(10,35,66,.08)}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--paper);color:var(--ink)}
  header{background:linear-gradient(135deg,var(--navy),var(--navy2));color:#fff;padding:18px 16px}
  .wrap{max-width:1000px;margin:0 auto;padding:0 14px;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
  h1{font-size:18px;margin:0}
  header button{font:inherit;cursor:pointer;border:none;border-radius:8px;padding:8px 13px;background:rgba(255,255,255,.16);color:#fff;font-weight:600}
  .whoami{font-size:12px;color:#cfe0f5}.whoami a{color:#cfe0f5;cursor:pointer}
  main{max-width:1000px;margin:0 auto;padding:18px 14px 60px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);padding:14px 16px;margin-bottom:14px}
  .card h2{font-size:13px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin:0 0 12px}
  label{display:block;font-size:13px;font-weight:600;margin-bottom:5px}
  input{width:100%;font:inherit;padding:9px 11px;border:1px solid var(--line);border-radius:9px}
  .row{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end}
  .row>div{flex:1;min-width:180px}
  button.go{font:inherit;font-weight:700;cursor:pointer;border:none;border-radius:9px;padding:10px 16px;background:var(--green);color:#fff;white-space:nowrap}
  button.go:disabled{background:#9bb6a6}
  .msg{font-size:13px;margin-top:10px}.msg.err{color:var(--red)}.msg.ok{color:var(--green)}
  .count{color:var(--muted);font-size:13px;margin:4px 0 12px}
  .sub .top{display:flex;justify-content:space-between;align-items:baseline;gap:10px;flex-wrap:wrap}
  .sub .nm{font-weight:700;font-size:16px}
  .sub .meta{font-size:12px;color:var(--muted)}
  .adminbadge{font-size:9.5px;font-weight:700;background:#fff7e0;color:#9a7b0a;padding:2px 7px;border-radius:999px;letter-spacing:.4px}
  .tline{display:flex;align-items:center;gap:10px;padding:8px 0;border-top:1px solid #eef1f5;font-size:13.5px;flex-wrap:wrap}
  .tname{font-weight:700;width:90px;flex:none}
  .pill{font-size:10px;font-weight:700;letter-spacing:.4px;padding:3px 8px;border-radius:999px;text-transform:uppercase}
  .pill.done{background:#e7f6ee;color:var(--green)} .pill.pending{background:#fff3e0;color:#9a6a00} .pill.locked{background:#f1f3f7;color:var(--muted)}
  .picks{color:var(--ink);font-size:13px}
  .picks .win{color:var(--green);font-weight:700}
  .empty{padding:30px;text-align:center;color:var(--muted)}
</style>
</head>
<body>
<header><div class="wrap"><h1>Entries <span style="opacity:.7;font-weight:400">· admin</span></h1>
  <div class="whoami" id="whoami"></div></div></header>
<main id="app"><div class="empty">Loading…</div></main>
<script src="season.js"></script>
<script>
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function fmtScore(v){ if(v==null||v==='')return ''; v=+v; return v===0?'E':(v>0?'+'+v:''+v); }
const SEASONMAP={}; (window.SEASON||[]).forEach(e=>{ SEASONMAP[(e.name||'').trim().toLowerCase()]=e; });
const SEASON_FIELD={masters:'masters', pga:'pga', theopen:'open'};
function seasonResult(teamName,key){ const f=SEASON_FIELD[key]; if(!f) return undefined; const e=SEASONMAP[(teamName||'').trim().toLowerCase()]; if(!e) return undefined; const v=e[f]; return (v===0||v)?v:undefined; }
function resStr(v){ return v==='DQ'?'DQ':fmtScore(v); }
let adminEmail='', TOURN=[];

function renderLogin(err){
  document.getElementById('whoami').innerHTML='';
  document.getElementById('app').innerHTML=`<div class="card">
    <h2>Admin sign-in</h2>
    <p style="font-size:14px;color:var(--muted);margin:0 0 12px">Enter your admin email to manage entries.</p>
    <label for="ae">Admin email</label>
    <input id="ae" type="email" placeholder="you@example.com">
    <div style="margin-top:12px"><button class="go" id="signin">Sign in →</button></div>
    <div class="msg ${err?'err':''}" id="m">${esc(err||'')}</div></div>`;
  const inp=document.getElementById('ae');
  const go=async()=>{
    const email=inp.value.trim(); if(!email) return;
    const r=await fetch('/api/entry?email='+encodeURIComponent(email),{cache:'no-store'});
    const d=await r.json();
    if(d.ok && d.entry.isAdmin){ adminEmail=email; load(); }
    else renderLogin('That email is not an admin.');
  };
  document.getElementById('signin').onclick=go;
  inp.onkeydown=e=>{ if(e.key==='Enter') go(); };
  inp.focus();
}

async function load(){
  document.getElementById('whoami').innerHTML=`signed in as ${esc(adminEmail)} · <a id="out">log out</a>`;
  const [er,tr]=await Promise.all([
    fetch('/api/entries?adminEmail='+encodeURIComponent(adminEmail)+'&_='+Date.now(),{cache:'no-store'}),
    fetch('/api/tournaments',{cache:'no-store'})
  ]);
  if(er.status===403){ renderLogin('Admin access only.'); return; }
  const list=await er.json(); TOURN=await tr.json();

  document.getElementById('app').innerHTML=`
    <div class="card">
      <h2>Register an entry</h2>
      <div class="row">
        <div><label for="tn">Team / entry name</label><input id="tn" placeholder="e.g. Bengal Nation"></div>
        <div><label for="em">Email</label><input id="em" type="email" placeholder="player@example.com"></div>
        <button class="go" id="add">Add entry</button>
      </div>
      <div class="msg" id="addMsg"></div>
      <p style="color:var(--muted);font-size:12px;margin-top:8px">The participant logs in at <b>/submit</b> with this email to make their picks.</p>
    </div>
    <div class="count" id="count"></div>
    <div id="list"></div>`;
  document.getElementById('out').onclick=()=>{adminEmail=''; renderLogin();};
  document.getElementById('add').onclick=addEntry;

  const subs=list.filter(e=>TOURN.some(t=>e.picks&&e.picks[t.key])).length;
  document.getElementById('count').textContent=`${list.length} entr${list.length===1?'y':'ies'} · ${subs} with at least one submission`;

  document.getElementById('list').innerHTML = !list.length ? '<div class="empty">No entries yet. Register one above.</div>' :
    list.map(e=>`<div class="card sub">
      <div class="top">
        <div class="nm">${esc(e.teamName)} ${e.isAdmin?'<span class="adminbadge">ADMIN</span>':''}</div>
        <div class="meta">${esc(e.email)}</div>
      </div>
      ${TOURN.map(t=>{
        const p=e.picks&&e.picks[t.key];
        const sres=seasonResult(e.teamName,t.key);
        let pill = t.locked ? '<span class="pill locked">'+(t.status==='Final'?'Final':'Locked')+'</span>' : (p?'<span class="pill done">Submitted</span>':'<span class="pill pending">Pending</span>');
        let picks;
        if(p) picks=`<span class="picks">${p.starters.map(esc).join(', ')} <b>+</b> ${p.bench.map(esc).join(', ')} · winner <span class="win">${esc(p.pick)} ${fmtScore(p.pickScore)}</span></span>`;
        else if(sres!==undefined) picks=`<span class="picks">final result <span class="win">${esc(resStr(sres))}</span></span>`;
        else picks='<span class="picks" style="color:var(--muted)">—</span>';
        return `<div class="tline"><span class="tname">${esc(t.name)}</span>${pill}${picks}</div>`;
      }).join('')}
    </div>`).join('');
}

async function addEntry(){
  const msg=document.getElementById('addMsg'); msg.className='msg'; msg.textContent='Adding…';
  try{
    const r=await fetch('/api/entries',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({adminEmail, teamName:document.getElementById('tn').value.trim(), email:document.getElementById('em').value.trim()})});
    const d=await r.json();
    if(!d.ok) throw new Error(d.error||'Failed');
    msg.className='msg ok'; msg.textContent='Added.';
    document.getElementById('tn').value=''; document.getElementById('em').value='';
    load();
  }catch(e){ msg.className='msg err'; msg.textContent=e.message; }
}
renderLogin();
</script>
</body>
</html>
