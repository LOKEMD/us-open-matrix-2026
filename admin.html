<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Submissions — Majors Pool (admin)</title>
<style>
  :root{--navy:#0a2342;--navy2:#143a66;--ink:#0d1b2a;--paper:#f4f6f9;--card:#fff;--line:#e2e8f0;--muted:#64748b;--green:#1a7f4b;--shadow:0 1px 3px rgba(10,35,66,.08)}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--paper);color:var(--ink)}
  header{background:linear-gradient(135deg,var(--navy),var(--navy2));color:#fff;padding:18px 16px}
  .wrap{max-width:1000px;margin:0 auto;padding:0 14px;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
  h1{font-size:18px;margin:0}
  button{font:inherit;cursor:pointer;border:none;border-radius:8px;padding:8px 13px;background:rgba(255,255,255,.16);color:#fff;font-weight:600}
  main{max-width:1000px;margin:0 auto;padding:18px 14px 60px}
  .count{color:var(--muted);font-size:13px;margin-bottom:12px}
  .sub{background:var(--card);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);padding:14px 16px;margin-bottom:12px}
  .sub .top{display:flex;justify-content:space-between;align-items:baseline;gap:10px;flex-wrap:wrap}
  .sub .nm{font-weight:700;font-size:16px}
  .sub .meta{font-size:12px;color:var(--muted)}
  .grid{display:flex;gap:24px;flex-wrap:wrap;margin-top:10px;font-size:14px}
  .grid h3{font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin:0 0 5px}
  .grid li{list-style:none}.grid ul{margin:0;padding:0}
  .win{color:var(--green);font-weight:700}
  .empty{padding:40px;text-align:center;color:var(--muted)}
</style>
</head>
<body>
<header><div class="wrap"><h1>Team Submissions <span style="opacity:.7;font-weight:400">· admin</span></h1><button id="refresh">↻ Refresh</button></div></header>
<main>
  <div class="count" id="count">Loading…</div>
  <div id="list"></div>
</main>
<script>
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function fmtScore(v){ if(v==null||v==='')return ''; v=+v; return v===0?'E':(v>0?'+'+v:''+v); }
async function load(){
  const r=await fetch('/api/submissions?_='+Date.now(),{cache:'no-store'});
  const subs=await r.json();
  document.getElementById('count').textContent=`${subs.length} submission${subs.length===1?'':'s'}`;
  const list=document.getElementById('list');
  if(!subs.length){ list.innerHTML='<div class="empty">No submissions yet.</div>'; return; }
  list.innerHTML=subs.slice().reverse().map(s=>`
    <div class="sub">
      <div class="top">
        <div class="nm">${esc(s.teamName)}</div>
        <div class="meta">${esc(s.email)} · ${new Date(s.submittedAt).toLocaleString()}</div>
      </div>
      <div class="grid">
        <div><h3>Starters</h3><ul>${s.starters.map(p=>`<li>${esc(p)}</li>`).join('')}</ul></div>
        <div><h3>Bench</h3><ul>${s.bench.map(p=>`<li>${esc(p)}</li>`).join('')}</ul></div>
        <div><h3>Outright winner</h3><div class="win">${esc(s.pick)} ${fmtScore(s.pickScore)}</div></div>
      </div>
    </div>`).join('');
}
document.getElementById('refresh').onclick=load;
load();
</script>
</body>
</html>
