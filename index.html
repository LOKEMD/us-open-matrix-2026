<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>2026 U.S. Open — Matrix Pool</title>
<style>
  :root{
    --navy:#0a2342; --navy2:#143a66; --ink:#0d1b2a; --paper:#f4f6f9; --card:#fff;
    --line:#e2e8f0; --muted:#64748b; --green:#1a7f4b; --red:#c0392b; --gold:#c9a227;
    --shadow:0 1px 3px rgba(10,35,66,.08),0 1px 2px rgba(10,35,66,.06);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased}
  header{background:linear-gradient(135deg,var(--navy),var(--navy2));color:#fff;padding:18px 16px}
  .wrap{max-width:920px;margin:0 auto;padding:0 14px}
  .htop{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
  h1{font-size:19px;margin:0;letter-spacing:.2px;font-weight:700}
  h1 small{display:block;font-weight:500;font-size:12px;opacity:.8;letter-spacing:.4px;margin-top:2px}
  .status{display:flex;align-items:center;gap:10px;font-size:12.5px;flex-wrap:wrap}
  .pill{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.14);
    padding:5px 10px;border-radius:999px;font-weight:600}
  .dot{width:8px;height:8px;border-radius:50%;background:#39d98a;box-shadow:0 0 0 0 rgba(57,217,138,.7);animation:pulse 2s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(57,217,138,.6)}70%{box-shadow:0 0 0 8px rgba(57,217,138,0)}100%{box-shadow:0 0 0 0 rgba(57,217,138,0)}}
  button{font:inherit;cursor:pointer;border:none;border-radius:8px;padding:7px 12px;background:rgba(255,255,255,.16);color:#fff;font-weight:600}
  button:hover{background:rgba(255,255,255,.26)}
  .tabs{display:flex;gap:6px;margin-top:14px;flex-wrap:wrap}
  .tab{background:rgba(255,255,255,.10);padding:8px 16px;border-radius:8px 8px 0 0;font-weight:600;font-size:14px;cursor:pointer}
  .tab.active{background:var(--paper);color:var(--navy)}
  .subtabs{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
  .subtabs .tab{border-radius:999px;padding:6px 14px;font-size:13px;background:rgba(255,255,255,.08)}
  .subtabs .tab.active{background:rgba(255,255,255,.92);color:var(--navy)}
  main{max-width:920px;margin:0 auto;padding:16px 14px 60px}
  .toolbar{display:flex;gap:10px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
  input[type=search]{flex:1;min-width:180px;font:inherit;padding:9px 12px;border:1px solid var(--line);
    border-radius:9px;background:#fff;color:var(--ink)}
  .count{font-size:12.5px;color:var(--muted)}
  table{width:100%;border-collapse:collapse;background:var(--card);border-radius:12px;overflow:hidden;box-shadow:var(--shadow)}
  thead th{background:#f8fafc;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.5px;
    color:var(--muted);padding:10px 12px;border-bottom:1px solid var(--line)}
  tbody td{padding:11px 12px;border-bottom:1px solid var(--line);font-size:14.5px;vertical-align:middle}
  tbody tr:last-child td{border-bottom:none}
  .rk{width:40px;color:var(--muted);font-variant-numeric:tabular-nums;font-weight:600}
  .nm{font-weight:600}
  .sub{font-size:12px;color:var(--muted);font-weight:500;margin-top:1px}
  .sc{text-align:right;font-variant-numeric:tabular-nums;font-weight:700;width:70px}
  .thru{text-align:right;color:var(--muted);font-size:12.5px;width:70px;font-variant-numeric:tabular-nums}
  .under{color:var(--green)} .over{color:var(--red)} .even{color:var(--ink)}
  tr.team{cursor:pointer} tr.team:hover td{background:#f8fbff}
  tr.team .nm::before{content:"▸";color:var(--muted);font-size:11px;margin-right:7px;display:inline-block;transition:transform .15s}
  tr.team.open .nm::before{transform:rotate(90deg)}
  tr.detail td{padding:0;background:#f8fafc}
  .panel{padding:6px 12px 14px}
  .pgrid{width:100%;border-collapse:collapse;margin-top:4px;background:#fff;border-radius:8px;overflow:hidden;border:1px solid var(--line)}
  .pgrid th{background:transparent;font-size:10.5px;padding:7px 9px}
  .pgrid td{padding:8px 9px;font-size:13.5px;border-bottom:1px solid #eef1f5}
  .pgrid .r{text-align:right;font-variant-numeric:tabular-nums;width:46px}
  .pgrid .tot{font-weight:700}
  .badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 6px;border-radius:5px;margin-left:6px;vertical-align:middle}
  .b-cut{background:#fdecea;color:var(--red)} .b-bench{background:#eef2ff;color:#3b5bdb}
  .b-act{background:#e7f6ee;color:var(--green)} .b-win{background:#fff7e0;color:#9a7b0a}
  .rowdim{opacity:.45}
  .sep{height:1px;background:var(--line);margin:2px 0}
  .teamtot{display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding:0 2px;font-size:13px}
  .teamtot b{font-size:16px}
  td.starcell,th.starcell{width:34px;text-align:center;padding-left:10px;padding-right:0}
  .star-btn{background:none;border:none;font-size:19px;line-height:1;color:#cbd5e1;cursor:pointer;padding:2px 4px;border-radius:6px;transition:transform .1s,color .15s}
  .star-btn:hover{color:var(--gold);background:none;transform:scale(1.18)}
  .star-btn.on{color:var(--gold)}
  tr.favrow td{background:#fffdf3}
  tr.team.favrow:hover td{background:#fff8e0}
  tr.divider td{background:#eef2f7;padding:6px 12px;font-size:10.5px;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);font-weight:700}
  .loading,.err{padding:40px 16px;text-align:center;color:var(--muted)}
  .err{color:var(--red)}
  .legend{font-size:11.5px;color:var(--muted);margin-top:14px;display:flex;gap:14px;flex-wrap:wrap}
  .legend span{display:inline-flex;align-items:center;gap:5px}
  .hide{display:none}
  .statbar{display:flex;gap:10px;margin-bottom:14px}
  .stat{flex:1;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px 12px;box-shadow:var(--shadow);text-align:center}
  .statnum{font-size:23px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums}
  .statlbl{font-size:10.5px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);margin-top:5px;font-weight:600}
  .stat.alive .statnum{color:var(--green)} .stat.dq .statnum{color:var(--red)}
  .statlbl b{color:var(--red)}
  @media(max-width:560px){.statnum{font-size:19px} .statlbl{font-size:9.5px} .stat{padding:9px 6px}}
  .feature{background:linear-gradient(135deg,#fff,#fff8f6);border:1px solid #f3d8d0;border-left:4px solid var(--red);
    border-radius:12px;box-shadow:var(--shadow);padding:14px 16px;margin-bottom:14px}
  .feature .ft{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--red);font-weight:700}
  .feature .fb{font-size:15px;margin-top:5px;line-height:1.45}
  .feature .fb b{color:var(--ink)}
  .statsec{background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);margin-bottom:14px;overflow:hidden}
  .sectitle{font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:700;padding:12px 14px 8px;display:flex;justify-content:space-between;align-items:baseline;gap:8px}
  .secsub{color:#9aa6b4;font-weight:500;text-transform:none;letter-spacing:0;font-size:11.5px}
  .srow{display:flex;align-items:center;gap:10px;padding:9px 14px;border-top:1px solid #eef1f5;font-size:14px}
  .srow .r{color:var(--muted);font-variant-numeric:tabular-nums;width:26px;font-weight:700;font-size:12.5px;flex:none}
  .srow .nm{font-weight:600;flex:none}
  .srow .mid{flex:1;min-width:30px}
  .srow .bar{height:6px;border-radius:3px;background:linear-gradient(90deg,var(--navy2),var(--navy));opacity:.85}
  .srow .meta{color:var(--muted);font-size:12px;white-space:nowrap}
  .srow .v{font-variant-numeric:tabular-nums;font-weight:700;text-align:right;min-width:46px;flex:none}
  .scrollx{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:12px}
  .scrollx table{min-width:600px}
  th.uso,td.uso{background:#fbfdff;box-shadow:inset 1px 0 0 var(--line),inset -1px 0 0 var(--line)}
  th.uso{color:var(--navy)}
  .livedot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#39d98a;margin-left:4px;vertical-align:middle}
  @media(max-width:560px){
    h1{font-size:16px} .pgrid .r{width:38px;padding:8px 5px} .pgrid td,.pgrid th{padding:7px 5px}
    tbody td{padding:10px 8px}
  }
</style>
</head>
<body>
<header>
  <div class="wrap">
    <div class="htop">
      <h1>2026 Majors Pool <small id="subtitle">U.S. OPEN · SHINNECOCK HILLS</small></h1>
      <div class="status">
        <span class="pill" id="statuspill"><span class="dot"></span><span id="round">Loading…</span></span>
        <span class="pill" id="updated">—</span>
        <button id="refresh">↻ Refresh</button>
      </div>
    </div>
    <div class="tabs" id="majortabs">
      <div class="tab" data-major="masters">Masters</div>
      <div class="tab" data-major="pga">PGA</div>
      <div class="tab active" data-major="usopen">U.S. Open</div>
      <div class="tab" data-major="theopen">The Open</div>
      <div class="tab" data-major="season">Season</div>
    </div>
    <div class="subtabs" id="subtabs">
      <div class="tab active" data-sub="teams">Teams</div>
      <div class="tab" data-sub="players">Players</div>
      <div class="tab" data-sub="stats">Stats</div>
    </div>
  </div>
</header>
<main>
  <div class="toolbar">
    <input type="search" id="q" placeholder="Search teams or players…">
    <span class="count" id="count"></span>
  </div>
  <div id="content"><div class="loading">Fetching live leaderboard…</div></div>
  <div class="legend">
    <span><span class="badge b-win">PICK</span>outright winner pick</span>
    <span><span class="badge b-bench">BENCH</span>reserve</span>
    <span><span class="badge b-act">IN</span>active sub</span>
    <span><span class="badge b-cut">CUT</span>missed cut</span>
  </div>
</main>

<script src="data.js"></script>
<script src="masters.js"></script>
<script src="season.js"></script>
<script>
const EVENT_ID = MATRIX.eventId, PAR = MATRIX.par;
const ALIAS = {'ben james':'benjamin james','matti schmid':'matthias schmid','rocco repetto taylor':'rocco paolo repetto taylor'};
const SCAND = {'ø':'o','å':'a','æ':'a','ö':'o','ü':'u','é':'e','ø':'o'};
function norm(s){
  s=(s||'').toLowerCase();
  s=s.replace(/[øåæöüé]/g,c=>SCAND[c]||c);
  s=s.normalize('NFKD').replace(/[̀-ͯ]/g,'');
  s=s.replace(/\(a\)/g,'').replace(/[^a-z ]/g,'').replace(/\s+/g,' ').trim();
  return ALIAS[s]||s;
}
function toNum(dv){ if(dv==null)return 0; const s=String(dv).trim(); if(s==='E'||s==='e')return 0; const n=parseInt(s,10); return isNaN(n)?0:n; }
function fmt(v){ if(v==='CUT')return 'CUT'; if(v==='DQ')return 'DQ'; if(v===0)return 'E'; return v>0?('+'+v):(''+v); }
function cls(v){ if(v==='CUT'||v==='DQ')return ''; if(v>0)return 'over'; if(v<0)return 'under'; return 'even'; }

let PLAYERS={};   // normname -> {name, rounds:[to-par per round], total, thru, status, cut}
let META={round:'',state:''};
let major='usopen', sub='teams', query='';
const SUBTITLES={usopen:'U.S. OPEN · SHINNECOCK HILLS', masters:'MASTERS · FINAL', pga:'PGA CHAMPIONSHIP · FINAL', theopen:'THE OPEN · UPCOMING', season:'SEASON STANDINGS'};

// Favorited teams and players, persisted on this device. Keys are namespaced by
// the active major (e.g. "usopen:5", "masters:rory mcilroy") so the two majors
// keep independent favorites.
let FAVS = new Set(JSON.parse(localStorage.getItem('matrixFavs')||'[]'));
function favTeamKey(i){ return major+':'+i; }
function toggleFav(i){ const k=favTeamKey(i); FAVS.has(k)?FAVS.delete(k):FAVS.add(k); localStorage.setItem('matrixFavs',JSON.stringify([...FAVS])); render(); }
let FAVP = new Set(JSON.parse(localStorage.getItem('matrixFavPlayers')||'[]'));
function favPlayerKey(id){ return major+':'+id; }
function togglePlayerFav(id){ const k=favPlayerKey(id); FAVP.has(k)?FAVP.delete(k):FAVP.add(k); localStorage.setItem('matrixFavPlayers',JSON.stringify([...FAVP])); render(); }
let FAVSEA = new Set(JSON.parse(localStorage.getItem('matrixFavSeason')||'[]'));
function toggleSeasonFav(i){ FAVSEA.has(i)?FAVSEA.delete(i):FAVSEA.add(i); localStorage.setItem('matrixFavSeason',JSON.stringify([...FAVSEA])); render(); }

async function load(){
  try{
    const url=`https://site.api.espn.com/apis/site/v2/sports/golf/leaderboard?event=${EVENT_ID}&_=${Date.now()}`;
    const r=await fetch(url,{cache:'no-store'});
    if(!r.ok) throw new Error('HTTP '+r.status);
    const d=await r.json();
    parse(d);
    render();
    document.getElementById('updated').textContent='Updated '+new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
  }catch(e){
    document.getElementById('content').innerHTML='<div class="err">Couldn’t reach the live feed.<br><small>'+e.message+
      '</small><br><br>If you opened this file directly, some browsers block the request — try the Refresh button, or host the folder (e.g. a quick local server).</div>';
    document.getElementById('round').textContent='offline';
  }
}

function parse(d){
  const ev=d.events[0], comp=ev.competitions[0];
  META.round = ev.status?.type?.description || '';
  const period = comp.status?.period || ev.status?.period || 1;
  const st=ev.status?.type||{};
  META.state = st.state||'';
  META.label = st.state==='post' ? 'Final' : (st.state==='pre' ? (ev.status?.type?.shortDetail||'Upcoming') : ('Round '+period));
  PLAYERS={};
  for(const c of comp.competitors){
    const nm=c.athlete?.displayName||'';
    const cut = (c.status?.type?.name==='STATUS_CUT');
    // Build each round's to-par from linescores[].displayValue. This is LIVE for the
    // in-progress round (e.g. "-1" thru 7 holes), unlike score.displayValue which only
    // reflects completed rounds. Total = sum of per-round to-pars = current live total.
    const ls=c.linescores||[];
    const rounds=[null,null,null,null];
    let total=0, hasRounds=false;
    for(const l of ls){
      const idx=(l?.period||0)-1;
      if(idx>=0 && idx<4 && l.displayValue!=null){
        const tp=toNum(l.displayValue);
        rounds[idx]=tp; total+=tp; hasRounds=true;
      }
    }
    // Pre-tournament / no rounds yet: fall back to overall score if present.
    if(!hasRounds && c.score?.displayValue!=null) total=toNum(c.score.displayValue);
    PLAYERS[norm(nm)]={
      name:nm, rounds, total, cut,
      thru:c.status?.displayThru||c.status?.type?.shortDetail||'',
      finished:c.status?.type?.state==='post'
    };
  }
}

// Active dataset: U.S. Open is live (PLAYERS rebuilt each fetch); Masters is the
// baked-in final data. Same {teams, players} shape, so the same engine renders both.
let CUR = {teams: MATRIX.teams, players: PLAYERS};
function activeDS(){
  if(major==='masters') return {teams:MASTERS.teams, players:MASTERS.players};
  return {teams:MATRIX.teams, players:PLAYERS};
}
function P(name){ return CUR.players[norm(name)] || {name, rounds:[null,null,null,null], total:0, cut:false, thru:'—', missing:true}; }
function ptotal(name){ const p=P(name); return p.cut?'CUT':p.total; }

// EXACT mirror of the spreadsheet scoring
function teamScore(t){
  const s=t.s.map(ptotal), b=t.b.map(ptotal);
  const all=s.concat(b);
  const cutS=s.filter(x=>x==='CUT').length;
  const cutAll=all.filter(x=>x==='CUT').length;
  const nums=a=>a.reduce((z,x)=>z+(typeof x==='number'?x:0),0);
  let val, active=[0,1,2,3,4], benchIn=[];
  if(cutAll>=3) return {val:'DQ',active:[],benchIn:[]};
  if(cutS>2) return {val:'DQ',active:[],benchIn:[]};
  if(cutS===2){ val=nums(all); benchIn=[0,1]; }
  else if(cutS===1){
    const add = (b[0]!=='CUT') ? 0 : 1;        // which bench slot fills in
    benchIn=[add];
    val = nums(s) + (typeof b[add]==='number'?b[add]:0);
  } else { val=nums(s); }
  return {val, benchIn};
}

function scoreCell(v){ return `<span class="${cls(v)}">${fmt(v)}</span>`; }

const FULL_MATRIX={usopen:1, masters:1};   // majors with the full Teams/Players/Stats matrix
function render(){
  CUR = activeDS();
  const full = !!FULL_MATRIX[major];
  document.getElementById('subtitle').textContent = SUBTITLES[major]||'';
  // header status pill: live only for the U.S. Open; static label otherwise
  const liveLbl = META.label||META.round||'live';
  document.getElementById('round').textContent = major==='usopen' ? liveLbl
    : (major==='season'?'All majors':(major==='theopen'?'Upcoming':'Final'));
  document.getElementById('updated').style.display = major==='usopen' ? '' : 'none';
  document.querySelector('#statuspill .dot').style.display = major==='usopen' ? '' : 'none';
  document.getElementById('subtabs').style.display = full ? '' : 'none';

  const v = full ? sub : major;
  document.querySelector('.toolbar').style.display = (v==='stats'||v==='theopen') ? 'none' : '';
  document.querySelector('.legend').style.display = (full && sub==='teams') ? '' : 'none';

  if(major==='season') renderSeason();
  else if(major==='pga') renderMajorStandings('pga','PGA Championship');
  else if(major==='theopen') renderOpenStatus();
  else if(sub==='players') renderPlayers();
  else if(sub==='stats') renderStats();
  else renderTeams();
}

// Pool standings for a completed major, from the season scoreboard scores.
function renderMajorStandings(key,label){
  const rows=SEASON.map((s,i)=>({s,i,v:s[key]}));
  const ranked=rows.filter(r=>typeof r.v==='number').sort((a,b)=>a.v-b.v);
  const dq=rows.filter(r=>r.v==='DQ'), none=rows.filter(r=>r.v==null);
  let ordered=[],pos=0,prev=null,seen=0;
  for(const r of ranked){ seen++; if(r.v!==prev){pos=seen;prev=r.v;} ordered.push({...r,pos}); }
  for(const r of dq.concat(none)) ordered.push({...r,pos:'—'});

  const q=query.trim().toLowerCase();
  const vis=ordered.filter(r=>!q||r.s.name.toLowerCase().includes(q));
  document.getElementById('count').textContent=`${label} · ${ranked.length} scored`;
  const favs=vis.filter(r=>FAVSEA.has(r.i)), rest=vis.filter(r=>!FAVSEA.has(r.i));
  const row=r=>{
    const fav=FAVSEA.has(r.i);
    const val = r.v==='DQ' ? '<span style="color:var(--red);font-weight:700">DQ</span>'
      : (r.v==null ? '<span style="color:var(--muted)">—</span>' : scoreCell(r.v));
    return `<tr class="team ${fav?'favrow':''}">
      <td class="starcell"><button class="star-btn ${fav?'on':''}" data-favsea="${r.i}" aria-label="Favorite ${esc(r.s.name)}">★</button></td>
      <td class="rk">${r.pos}</td><td class="nm">${esc(r.s.name)}</td><td class="sc"><b>${val}</b></td></tr>`;
  };
  let h='<table><thead><tr><th class="starcell"></th><th class="rk">#</th><th>Entry</th><th class="sc">'+esc(label)+'</th></tr></thead><tbody>';
  if(favs.length){ h+='<tr class="divider"><td colspan="4">★ Favorites</td></tr>'; favs.forEach(r=>h+=row(r)); h+='<tr class="divider"><td colspan="4">All entries</td></tr>'; }
  rest.forEach(r=>h+=row(r)); h+='</tbody></table>';
  const c=document.getElementById('content'); c.innerHTML=h;
  c.querySelectorAll('.star-btn').forEach(b=>b.onclick=e=>{e.stopPropagation(); toggleSeasonFav(+b.dataset.favsea);});
}

function renderOpenStatus(){
  document.getElementById('count').textContent='';
  document.getElementById('content').innerHTML=`
    <div class="feature" style="border-left-color:var(--gold);background:linear-gradient(135deg,#fff,#fffdf3);border-color:#f0e3bd">
      <div class="ft" style="color:#9a7b0a">⛳ The Open — not started</div>
      <div class="fb">The Open Championship hasn’t teed off yet, so there are no scores to show. The field and live scoring will appear here once it’s underway.</div>
    </div>
    <div class="statsec"><div class="sectitle">Get your picks in</div>
      <div class="srow"><span class="nm" style="flex:1">Submit your team for The Open</span><a href="/submit" style="color:var(--navy);font-weight:700;text-decoration:none">/submit →</a></div>
    </div>`;
}

// Team-name normalizer that keeps digits (team names like "513B", "8NOWMAN").
function normTeam(s){ return (s||'').normalize('NFKD').replace(/[̀-ͯ]/g,'').toLowerCase().replace(/[^a-z0-9 ]/g,'').replace(/\s+/g,' ').trim(); }

// Live U.S. Open score for each entry, keyed by team name, from the Matrix standings.
function usOpenLiveMap(){
  const map={};
  MATRIX.teams.forEach(t=>{ const k=normTeam(t.name); if(!(k in map)) map[k]=teamScore(t).val; });
  return map;
}
// Season total = Masters + PGA + US Open + The Open + Bonus; DQ in any major => season DQ.
function seasonTotal(s,uso){
  const majors=[s.masters,s.pga,uso,s.open];
  if(majors.some(v=>v==='DQ')) return 'DQ';
  return majors.concat([s.bonus]).reduce((a,v)=>a+(typeof v==='number'?v:0),0);
}
function majorCell(v,extra){
  const c='sc'+(extra?(' '+extra):'');
  if(v==null) return `<td class="${c}">–</td>`;
  if(v==='DQ') return `<td class="${c}"><span style="color:var(--red);font-size:11px;font-weight:700">DQ</span></td>`;
  return `<td class="${c} ${cls(v)}">${fmt(v)}</td>`;
}

function renderSeason(){
  const uso=usOpenLiveMap();
  const rows=SEASON.map((s,i)=>{ const k=normTeam(s.name); const u=(k in uso)?uso[k]:null; return {s,i,uso:u,tot:seasonTotal(s,u)}; });
  const rank=rows.filter(r=>typeof r.tot==='number').sort((a,b)=>a.tot-b.tot);
  const dq=rows.filter(r=>r.tot==='DQ');
  let ordered=[],pos=0,prev=null,seen=0;
  for(const r of rank){ seen++; if(r.tot!==prev){pos=seen;prev=r.tot;} ordered.push({...r,pos}); }
  for(const r of dq) ordered.push({...r,pos:'—'});

  const q=query.trim().toLowerCase();
  const vis=ordered.filter(r=>!q||r.s.name.toLowerCase().includes(q));
  document.getElementById('count').textContent=`${vis.length} of ${SEASON.length} season entries`;

  const favs=vis.filter(r=>FAVSEA.has(r.i));   // pinned to top, still ordered by total
  const rest=vis.filter(r=>!FAVSEA.has(r.i));

  const rowHtml=r=>{
    const fav=FAVSEA.has(r.i);
    const totCell = r.tot==='DQ' ? '<span style="color:var(--red);font-weight:700">DQ</span>' : scoreCell(r.tot);
    return `<tr class="${fav?'favrow':''}">`
      +`<td class="starcell"><button class="star-btn ${fav?'on':''}" data-favsea="${r.i}" aria-label="Favorite ${esc(r.s.name)}">★</button></td>`
      +`<td class="rk">${r.pos}</td><td class="nm">${esc(r.s.name)}</td>`
      +majorCell(r.s.masters)+majorCell(r.s.pga)+majorCell(r.uso,'uso')+majorCell(r.s.open)+majorCell(r.s.bonus)
      +`<td class="sc"><b>${totCell}</b></td></tr>`;
  };

  const aliveN=rank.length, dqN=dq.length, usoDqN=rows.filter(r=>r.uso==='DQ').length;
  const dqLbl = usoDqN ? `DQ'd <b>(${usoDqN} via US Open)</b>` : "DQ'd";
  let h=`<div class="statbar">`
    +`<div class="stat"><div class="statnum">${SEASON.length}</div><div class="statlbl">Entries</div></div>`
    +`<div class="stat alive"><div class="statnum">${aliveN}</div><div class="statlbl">Still alive</div></div>`
    +`<div class="stat dq"><div class="statnum">${dqN}</div><div class="statlbl">${dqLbl}</div></div></div>`;

  const live = META.state && META.state!=='post' ? '<span class="livedot" title="live"></span>' : '';
  h+='<div class="scrollx"><table><thead><tr><th class="starcell"></th><th class="rk">#</th><th>Entry</th>'
    +'<th class="sc">Masters</th><th class="sc">PGA</th><th class="sc uso">US Open'+live+'</th>'
    +'<th class="sc">The Open</th><th class="sc">Bonus</th><th class="sc">Total</th></tr></thead><tbody>';
  if(favs.length){
    h+='<tr class="divider"><td colspan="9">★ Favorites</td></tr>';
    favs.forEach(r=>h+=rowHtml(r));
    h+='<tr class="divider"><td colspan="9">All entries</td></tr>';
  }
  rest.forEach(r=>h+=rowHtml(r));
  h+='</tbody></table></div>';
  const c=document.getElementById('content'); c.innerHTML=h;
  c.querySelectorAll('.star-btn').forEach(b=> b.onclick=e=>{ e.stopPropagation(); toggleSeasonFav(+b.dataset.favsea); });
}

function renderTeams(){
  const rows = CUR.teams.map((t,i)=>({t, i, sc:teamScore(t)}));
  const rank = rows.filter(r=>typeof r.sc.val==='number').sort((a,b)=>a.sc.val-b.sc.val);
  const dq = rows.filter(r=>typeof r.sc.val!=='number');
  let ordered=[]; let pos=0,prev=null,seen=0;
  for(const r of rank){ seen++; if(r.sc.val!==prev){pos=seen;prev=r.sc.val;} ordered.push({...r,pos}); }
  for(const r of dq) ordered.push({...r,pos:'—'});

  const q=query.trim().toLowerCase();
  const vis = ordered.filter(r=> !q || r.t.name.toLowerCase().includes(q) ||
      r.t.s.concat(r.t.b,[r.t.pick]).some(n=>n.toLowerCase().includes(q)));
  document.getElementById('count').textContent=`${vis.length} of ${CUR.teams.length} teams`;

  const favs = vis.filter(r=>FAVS.has(favTeamKey(r.i)));   // pinned to top, still ordered by rank
  const rest = vis.filter(r=>!FAVS.has(favTeamKey(r.i)));

  const rowHtml = r=>{
    const v=r.sc.val, fav=FAVS.has(favTeamKey(r.i));
    return `<tr class="team ${fav?'favrow':''}">
      <td class="starcell"><button class="star-btn ${fav?'on':''}" data-fav="${r.i}" aria-label="Favorite ${esc(r.t.name)}">★</button></td>
      <td class="rk">${r.pos}</td>
      <td><div class="nm">${esc(r.t.name)}</div><div class="sub">Winner: ${esc(r.t.pick||'—')}</div></td>
      <td class="sc">${scoreCell(v)}</td></tr>
      <tr class="detail hide"><td colspan="4"><div class="panel">${teamPanel(r.t,r.sc)}</div></td></tr>`;
  };

  let h='<table><thead><tr><th class="starcell"></th><th class="rk">#</th><th>Team</th><th class="sc">Total</th></tr></thead><tbody>';
  if(favs.length){
    h+='<tr class="divider"><td colspan="4">★ Favorites</td></tr>';
    favs.forEach(r=> h+=rowHtml(r));
    h+='<tr class="divider"><td colspan="4">All teams</td></tr>';
  }
  rest.forEach(r=> h+=rowHtml(r));
  h+='</tbody></table>';

  const c=document.getElementById('content'); c.innerHTML=h;
  c.querySelectorAll('.star-btn').forEach(b=> b.onclick=e=>{ e.stopPropagation(); toggleFav(+b.dataset.fav); });
  c.querySelectorAll('tr.team').forEach(tr=>tr.onclick=()=>{
    tr.classList.toggle('open'); tr.nextElementSibling.classList.toggle('hide');
  });
}

function rosterRow(name,opts){
  const p=P(name); const rounds=p.rounds||[null,null,null,null];
  const cell=v=> v==null? '<td class="r">–</td>' : `<td class="r ${cls(v)}">${fmt(v)}</td>`;
  let tag='';
  if(opts.bench) tag = opts.active? '<span class="badge b-act">IN</span>' : '<span class="badge b-bench">BENCH</span>';
  if(p.cut) tag+='<span class="badge b-cut">CUT</span>';
  if(opts.pick) tag+='<span class="badge b-win">PICK</span>';
  const dim = (opts.bench && !opts.active) ? 'rowdim' : '';
  const tot = p.cut?'CUT':p.total;
  return `<tr class="${dim}"><td>${esc(p.name)}${tag}</td>
    ${cell(rounds[0])}${cell(rounds[1])}${cell(rounds[2])}${cell(rounds[3])}
    <td class="r tot ${cls(tot)}">${fmt(tot)}</td></tr>`;
}

function teamPanel(t,sc){
  let h='<table class="pgrid"><thead><tr><th>Golfer</th><th class="r">R1</th><th class="r">R2</th><th class="r">R3</th><th class="r">R4</th><th class="r">Tot</th></tr></thead><tbody>';
  const pickName=norm(t.pick.replace(/\s[-+]?\d+\*?$/,''));
  t.s.forEach(n=> h+=rosterRow(n,{pick:norm(n)===pickName}));
  h+='<tr><td colspan="6" style="padding:0"><div class="sep"></div></td></tr>';
  t.b.forEach((n,i)=> h+=rosterRow(n,{bench:true, active:(sc.benchIn||[]).includes(i), pick:norm(n)===pickName}));
  h+='</tbody></table>';
  h+=`<div class="teamtot"><span>Team total (best 5 starters, subs for cut players)</span><b>${scoreCell(sc.val)}</b></div>`;
  return h;
}

function renderStats(){
  const field=Object.values(CUR.players);
  if(!field.length){ document.getElementById('content').innerHTML='<div class="loading">Waiting for live data…</div>'; return; }
  const TOT=CUR.teams.length;

  // field / cut. Cut line = worst 36-hole total that still made it (so it stays
  // correct after Rd 3 starts, when current totals include later rounds).
  const cut=field.filter(p=>p.cut).length, made=field.length-cut;
  const thirtySix=p=>(p.rounds?.[0]??0)+(p.rounds?.[1]??0);
  const madeScores=field.filter(p=>!p.cut).map(thirtySix);
  const cutLine=madeScores.length?Math.max(...madeScores):null;

  // teams (teamScore returns {val,...})
  const scored=CUR.teams.map(t=>({t,v:teamScore(t).val}));
  const liveNums=scored.filter(x=>typeof x.v==='number').map(x=>x.v).sort((a,b)=>a-b);
  const dqCount=scored.filter(x=>x.v==='DQ').length;
  const needSub=CUR.teams.filter(t=>t.s.some(n=>ptotal(n)==='CUT')).length;
  const unscathed=CUR.teams.filter(t=>![...t.s,...t.b].some(n=>ptotal(n)==='CUT')).length;
  const leaderName=(scored.find(x=>x.v===liveNums[0])||{}).t?.name||'';

  // ownership (merged by normalized name to avoid casing dupes)
  const ownMap={};
  CUR.teams.forEach(t=>[...new Set([...t.s,...t.b])].forEach(n=>{const k=norm(n);(ownMap[k]||(ownMap[k]={name:CUR.players[k]?.name||n,count:0})).count++;}));
  const owned=Object.values(ownMap).sort((a,b)=>b.count-a.count);

  // winner picks
  const wpMap={};
  CUR.teams.forEach(t=>{const n=(t.pick||'').replace(/\s[-+]?\d+\*?$/,'').trim(); if(n){const k=norm(n);(wpMap[k]||(wpMap[k]={name:CUR.players[k]?.name||n,count:0})).count++;}});
  const wp=Object.values(wpMap).sort((a,b)=>b.count-a.count);

  // tournament leaders + low rounds + cut casualties
  const leaders=field.filter(p=>!p.cut).slice().sort((a,b)=>a.total-b.total).slice(0,5);
  let lows=[]; field.forEach(p=>(p.rounds||[]).forEach((v,i)=>{ if(v!=null) lows.push({name:p.name,rd:i+1,v}); }));
  lows.sort((a,b)=>a.v-b.v); lows=lows.slice(0,5);
  const casualties=owned.filter(o=>ptotal(o.name)==='CUT').slice(0,6);

  const tag=v=> v==='CUT'?'<span style="color:var(--red);font-weight:700;font-size:12px">CUT</span>':`<span class="${cls(v)}">${fmt(v)}</span>`;
  const ownRow=(o,i)=>{const v=ptotal(o.name),pct=Math.round(o.count/TOT*100);
    return `<div class="srow"><span class="r">${i+1}</span><span class="nm" style="width:140px">${esc(o.name)}</span>
      <span class="mid"><div class="bar" style="width:${Math.max(pct,4)}%"></div></span>
      <span class="meta">${o.count}·${pct}%</span><span class="v">${tag(v)}</span></div>`;};
  const listRow=(name,meta,v,i)=>`<div class="srow"><span class="r">${i+1}</span><span class="nm" style="flex:1">${esc(name)}</span>${meta?`<span class="meta">${meta}</span>`:''}<span class="v">${v}</span></div>`;

  let h=`<div class="statbar">
    <div class="stat alive"><div class="statnum">${made}</div><div class="statlbl">Made cut</div></div>
    <div class="stat dq"><div class="statnum">${cut}</div><div class="statlbl">Missed cut</div></div>
    <div class="stat"><div class="statnum">${cutLine!=null?fmt(cutLine):'—'}</div><div class="statlbl">Cut line</div></div>
    <div class="stat dq"><div class="statnum">${dqCount}</div><div class="statlbl">Teams DQ'd</div></div>
  </div>`;

  if(casualties.length){const c=casualties[0],pct=Math.round(c.count/TOT*100);
    h+=`<div class="feature"><div class="ft">💀 Cut casualty of the day</div>
      <div class="fb"><b>${esc(c.name)}</b> missed the cut — and he was in <b>${c.count} teams (${pct}%)</b> of the pool.</div></div>`;}

  h+=`<div class="statsec"><div class="sectitle">Pool snapshot <span class="secsub">${TOT} teams</span></div>`
    +`<div class="srow"><span class="nm" style="flex:1">Leader — <b>${esc(leaderName)}</b></span><span class="v">${liveNums.length?tag(liveNums[0]):'—'}</span></div>`
    +`<div class="srow"><span class="nm" style="flex:1">Score range (non-DQ)</span><span class="v">${liveNums.length?fmt(liveNums[0])+' / '+fmt(liveNums[liveNums.length-1]):'—'}</span></div>`
    +`<div class="srow"><span class="nm" style="flex:1">Teams that needed a sub</span><span class="v">${needSub}</span></div>`
    +`<div class="srow"><span class="nm" style="flex:1">Unscathed by the cut</span><span class="v">${unscathed}</span></div></div>`;

  h+=`<div class="statsec"><div class="sectitle">Most-owned golfers <span class="secsub">live score →</span></div>${owned.slice(0,8).map(ownRow).join('')}</div>`;

  if(casualties.length>1)
    h+=`<div class="statsec"><div class="sectitle">Biggest cut casualties <span class="secsub">most-owned who missed</span></div>${casualties.map((o,i)=>listRow(o.name,o.count+' teams',tag('CUT'),i)).join('')}</div>`;

  h+=`<div class="statsec"><div class="sectitle">Outright winner picks <span class="secsub">who the pool backed</span></div>${wp.slice(0,6).map((o,i)=>listRow(o.name,o.count+' teams',tag(ptotal(o.name)),i)).join('')}</div>`;

  h+=`<div class="statsec"><div class="sectitle">On the course <span class="secsub">tournament leaders</span></div>${leaders.map((p,i)=>listRow(p.name,'',tag(p.total),i)).join('')}</div>`;

  h+=`<div class="statsec"><div class="sectitle">Lowest rounds <span class="secsub">single round, to par</span></div>${lows.map((l,i)=>listRow(l.name,'R'+l.rd,tag(l.v),i)).join('')}</div>`;

  document.getElementById('content').innerHTML=h;
}

function renderPlayers(){
  const arr=Object.values(CUR.players).slice().sort((a,b)=>{
    if(a.cut!==b.cut) return a.cut?1:-1;
    return a.total-b.total;
  });
  // rank over the full field (not the filtered view)
  let pos=0,prev=null,seen=0;
  arr.forEach(p=>{ if(!p.cut){ seen++; if(p.total!==prev){pos=seen;prev=p.total;} p._pos=pos; } else p._pos=null; });

  const q=query.trim().toLowerCase();
  const vis=arr.filter(p=>!q||p.name.toLowerCase().includes(q));
  document.getElementById('count').textContent=`${vis.length} players in the field`;

  const favs=vis.filter(p=>FAVP.has(favPlayerKey(norm(p.name))));   // pinned to top, still ordered by score
  const rest=vis.filter(p=>!FAVP.has(favPlayerKey(norm(p.name))));

  const rowHtml=p=>{
    const id=norm(p.name), fav=FAVP.has(favPlayerKey(id));
    const rk=p.cut?'<span style="color:var(--red);font-size:11px">CUT</span>':p._pos;
    const r=i=>{const v=p.rounds?.[i]; return `<td class="sc ${v==null?'':cls(v)}" style="font-weight:600">${v==null?'–':fmt(v)}</td>`};
    const tot=p.cut?'CUT':p.total;
    return `<tr class="${fav?'favrow':''}">
      <td class="starcell"><button class="star-btn ${fav?'on':''}" data-favp="${esc(id)}" aria-label="Favorite ${esc(p.name)}">★</button></td>
      <td class="rk">${rk}</td><td class="nm">${esc(p.name)}</td>${r(0)}${r(1)}${r(2)}${r(3)}
      <td class="sc ${cls(tot)}">${fmt(tot)}</td><td class="thru">${esc(p.thru||'')}</td></tr>`;
  };

  let h='<table><thead><tr><th class="starcell"></th><th class="rk">#</th><th>Player</th><th class="sc">R1</th><th class="sc">R2</th><th class="sc">R3</th><th class="sc">R4</th><th class="sc">Tot</th><th class="thru">Thru</th></tr></thead><tbody>';
  if(favs.length){
    h+='<tr class="divider"><td colspan="9">★ Favorites</td></tr>';
    favs.forEach(p=>h+=rowHtml(p));
    h+='<tr class="divider"><td colspan="9">All players</td></tr>';
  }
  rest.forEach(p=>h+=rowHtml(p));
  h+='</tbody></table>';
  const c=document.getElementById('content'); c.innerHTML=h;
  c.querySelectorAll('.star-btn').forEach(b=> b.onclick=e=>{ e.stopPropagation(); togglePlayerFav(b.dataset.favp); });
}

function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}

document.querySelectorAll('#majortabs .tab').forEach(t=>t.onclick=()=>{
  document.querySelectorAll('#majortabs .tab').forEach(x=>x.classList.remove('active'));
  t.classList.add('active'); major=t.dataset.major; render();
});
document.querySelectorAll('#subtabs .tab').forEach(t=>t.onclick=()=>{
  document.querySelectorAll('#subtabs .tab').forEach(x=>x.classList.remove('active'));
  t.classList.add('active'); sub=t.dataset.sub; render();
});
document.getElementById('q').addEventListener('input',e=>{query=e.target.value;render();});
document.getElementById('refresh').onclick=load;

load();
setInterval(load, 60000); // auto-refresh every 60s
</script>
