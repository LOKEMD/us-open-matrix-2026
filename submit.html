<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Submit Your Team — Majors Pool</title>
<style>
  :root{
    --navy:#0a2342;--navy2:#143a66;--ink:#0d1b2a;--paper:#f4f6f9;--card:#fff;
    --line:#e2e8f0;--muted:#64748b;--green:#1a7f4b;--red:#c0392b;--gold:#c9a227;
    --shadow:0 1px 3px rgba(10,35,66,.08),0 1px 2px rgba(10,35,66,.06);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased}
  header{background:linear-gradient(135deg,var(--navy),var(--navy2));color:#fff;padding:20px 16px}
  .wrap{max-width:780px;margin:0 auto;padding:0 14px;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
  h1{font-size:20px;margin:0;font-weight:700}
  h1 small{display:block;font-weight:500;font-size:12.5px;opacity:.82;margin-top:3px}
  .whoami{font-size:12.5px;text-align:right}
  .whoami b{display:block;font-size:15px}
  .whoami a{color:#cfe0f5;font-size:11.5px;cursor:pointer}
  main{max-width:780px;margin:0 auto;padding:18px 14px 70px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);padding:16px;margin-bottom:16px}
  .card h2{font-size:13px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin:0 0 12px}
  label{display:block;font-size:13px;font-weight:600;margin-bottom:5px}
  input,select{width:100%;font:inherit;padding:10px 12px;border:1px solid var(--line);border-radius:9px;background:#fff;color:var(--ink)}
  .row2{display:flex;gap:12px;flex-wrap:wrap}
  .row2>div{flex:1;min-width:200px}
  .slots{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .slot{display:flex;align-items:center;gap:8px;border:1px dashed var(--line);border-radius:9px;padding:9px 11px;min-height:44px;font-size:14px;background:#fbfdff}
  .slot.filled{border-style:solid;background:#fff}
  .slot.filled.editable{cursor:pointer}
  .slot.bench{background:#f6f7fb}
  .slot .tag{font-size:9.5px;font-weight:700;letter-spacing:.4px;color:var(--muted);width:54px;flex:none}
  .slot.bench .tag{color:#3b5bdb}
  .slot .who{font-weight:600;flex:1}
  .slot .empty{color:#aab4c2;font-weight:500}
  .slot .x{color:var(--red);font-weight:700;font-size:16px;line-height:1;opacity:.6}
  .slot.filled.editable:hover .x{opacity:1}
  .counts{font-size:12px;color:var(--muted);margin-top:8px}
  .search{margin:0 0 10px}
  .plist{max-height:340px;overflow-y:auto;border:1px solid var(--line);border-radius:10px}
  .pitem{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-bottom:1px solid #eef1f5;cursor:pointer;font-size:14.5px}
  .pitem:last-child{border-bottom:none}
  .pitem:hover{background:#f8fbff}
  .pitem.sel{background:#f0f7f1}
  .pitem.sel .who{color:var(--green);font-weight:700}
  .pitem .mark{font-size:13px;font-weight:700;color:var(--green)}
  .pitem.full{opacity:.4;cursor:not-allowed}
  button.primary{width:100%;font:inherit;font-weight:700;font-size:16px;cursor:pointer;border:none;border-radius:10px;padding:14px;background:var(--green);color:#fff}
  button.primary:disabled{background:#9bb6a6;cursor:not-allowed}
  .banner{border-radius:10px;padding:11px 14px;margin-bottom:16px;font-size:13.5px}
  .banner.info{background:#eef6ff;border:1px solid #d6e6fb} .banner.info b{color:var(--navy)}
  .banner.warn{background:#fff7e6;border:1px solid #f3e2bd;color:#7a5a00}
  .banner.lock{background:#f1f3f7;border:1px solid var(--line);color:var(--muted)}
  .msg{font-size:13.5px;margin-top:10px}
  .msg.err{color:var(--red)} .msg.ok{color:var(--green)}
  .loading{padding:30px;text-align:center;color:var(--muted)}
  .note{font-size:12px;color:var(--muted);margin-top:6px}
  .tlist{display:flex;flex-direction:column;gap:12px}
  .tcard{display:flex;align-items:center;justify-content:space-between;gap:12px;border:1px solid var(--line);border-radius:12px;padding:15px 16px;background:var(--card);box-shadow:var(--shadow);cursor:pointer}
  .tcard:hover{border-color:#c7d6ea}
  .tcard .tn{font-weight:700;font-size:17px}
  .tcard .ts{font-size:12.5px;color:var(--muted);margin-top:3px}
  .pill{font-size:10px;font-weight:700;letter-spacing:.4px;padding:3px 9px;border-radius:999px;text-transform:uppercase}
  .pill.open{background:#e7f6ee;color:var(--green)} .pill.locked{background:#f1f3f7;color:var(--muted)}
  .pill.done{background:#eef2ff;color:#3b5bdb}
  .arrow{color:#c2cedd;font-size:20px}
  .done{text-align:center;padding:26px 12px}
  .done .big{font-size:40px}
  .done h2{border:none;text-transform:none;letter-spacing:0;font-size:20px;color:var(--ink);margin:10px 0 6px}
  .summary{text-align:left;max-width:420px;margin:14px auto 0;font-size:14px}
  .summary .li{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--line)}
  .back{display:inline-block;color:var(--navy);font-weight:600;cursor:pointer;margin-bottom:14px;font-size:14px}
  @media(max-width:520px){.slots{grid-template-columns:1fr}}
</style>
</head>
<body>
<header><div class="wrap">
  <h1>Submit Your Team <small>2026 MAJORS POOL · pick 5 starters + 2 bench + an outright winner</small></h1>
  <div class="whoami" id="whoami"></div>
</div></header>
<main id="app"><div class="loading">Loading…</div></main>

<script src="data.js"></script>
<script src="season.js"></script>
<script>
// Final results for completed majors come from the season scoreboard (no
// per-roster picks exist for those — they predate this tool).
const SEASONMAP={}; (window.SEASON||[]).forEach(e=>{ SEASONMAP[(e.name||'').trim().toLowerCase()]=e; });
const SEASON_FIELD={masters:'masters', pga:'pga', theopen:'open'};
function seasonResult(teamName,key){
  const f=SEASON_FIELD[key]; if(!f) return undefined;
  const e=SEASONMAP[(teamName||'').trim().toLowerCase()]; if(!e) return undefined;
  const v=e[f]; return (v===0||v)?v:undefined;
}
function resStr(v){ return v==='DQ'?'DQ':fmtScore(v); }

let TOURNAMENTS = [];
let entry = null;        // {teamName,email,isAdmin,picks:{}}
let activeT = null;      // current tournament object
let readonly = false;
let FIELD = [], usingSample = false;
let selected = [], pick = '', pickScore = '', q = '';

const scoreOk = ()=> pickScore!=='' && Number.isFinite(+pickScore);
function fmtScore(v){ if(v==null||v==='')return ''; v=+v; return v===0?'E':(v>0?'+'+v:''+v); }
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
const app = ()=>document.getElementById('app');

// ---------- login ----------
function renderLogin(prefill){
  document.getElementById('whoami').innerHTML='';
  app().innerHTML=`
    <div class="card">
      <h2>Log in</h2>
      <p style="font-size:14px;color:var(--muted);margin:0 0 12px">Enter the email your entry is registered under. It links to your team name.</p>
      <label for="loginEmail">Email</label>
      <input id="loginEmail" type="email" placeholder="you@example.com" value="${esc(prefill||'')}">
      <div style="margin-top:12px"><button class="primary" id="loginBtn">Continue →</button></div>
      <div class="msg" id="loginMsg"></div>
    </div>`;
  const inp=document.getElementById('loginEmail');
  const go=()=>doLogin(inp.value);
  document.getElementById('loginBtn').onclick=go;
  inp.onkeydown=e=>{ if(e.key==='Enter') go(); };
  inp.focus();
}
async function doLogin(email){
  const msg=document.getElementById('loginMsg'); msg.className='msg'; msg.textContent='Checking…';
  email=(email||'').trim();
  if(!email){ msg.className='msg err'; msg.textContent='Enter your email.'; return; }
  try{
    const [er,tr]=await Promise.all([
      fetch('/api/entry?email='+encodeURIComponent(email),{cache:'no-store'}),
      fetch('/api/tournaments',{cache:'no-store'})
    ]);
    const ed=await er.json();
    if(!ed.ok) throw new Error(ed.error||'Not found');
    entry=ed.entry; TOURNAMENTS=await tr.json();
    renderTournaments();
  }catch(e){ msg.className='msg err'; msg.textContent=e.message; }
}
function logout(){ entry=null; activeT=null; renderLogin(); }
function whoami(){
  document.getElementById('whoami').innerHTML=`<span>Signed in as</span><b>${esc(entry.teamName)}</b><a id="logout">${esc(entry.email)} · log out</a>`;
  document.getElementById('logout')?.addEventListener('click',logout);
}

// ---------- tournaments list ----------
function renderTournaments(){
  whoami();
  const cards = TOURNAMENTS.map(t=>{
    const has = entry.picks && entry.picks[t.key];
    const sres = seasonResult(entry.teamName, t.key);
    let pill, sub;
    if(t.locked){
      pill='<span class="pill locked">'+(t.status==='Final'?'Final':'Locked')+'</span>';
      if(has) sub='Tournament '+t.status.toLowerCase()+' — view your picks';
      else if(sres!==undefined) sub='Final result: '+resStr(sres)+' — tap to view';
      else sub='Tournament '+t.status.toLowerCase()+' — no entry on file';
    }
    else { pill = has? '<span class="pill done">Submitted</span>' : '<span class="pill open">Open for picks</span>'; sub = has? 'You can still edit until it starts' : 'Make your selections'; }
    return `<div class="tcard" data-t="${t.key}">
      <div><div class="tn">${esc(t.name)}</div><div class="ts">${sub}</div></div>
      <div style="display:flex;align-items:center;gap:12px">${pill}<span class="arrow">›</span></div>
    </div>`;
  }).join('');
  app().innerHTML=`<div class="banner info">Pick or review your team for each major. You can only edit a tournament that hasn’t started yet.</div>
    <div class="tlist">${cards}</div>`;
  document.querySelectorAll('.tcard').forEach(el=> el.onclick=()=>openTournament(el.dataset.t));
}

// ---------- open a tournament ----------
async function openTournament(key){
  activeT = TOURNAMENTS.find(t=>t.key===key);
  readonly = activeT.locked;
  const prev = entry.picks?.[key];
  selected = prev ? [...prev.starters, ...prev.bench] : [];
  while(selected.length<7) selected.push(undefined);
  pick = prev?.pick || '';
  pickScore = (prev && (prev.pickScore===0||prev.pickScore)) ? String(prev.pickScore) : '';
  q=''; FIELD=[]; usingSample=false;

  if(readonly){ renderPicker(); return; }          // view-only: no field needed
  app().innerHTML='<div class="loading">Loading the player field…</div>';
  await loadField(activeT);
  renderPicker();
}

async function fetchField(eventId){
  const r=await fetch(`https://site.api.espn.com/apis/site/v2/sports/golf/leaderboard?event=${eventId}&_=${Date.now()}`,{cache:'no-store'});
  if(!r.ok) return [];
  const d=await r.json();
  return (d.events?.[0]?.competitions?.[0]?.competitors||[]).map(c=>c.athlete?.displayName).filter(Boolean);
}
async function loadField(t){
  try{
    let f=await fetchField(t.fieldEventId);
    if(!f.length && t.fallbackFieldEventId){ f=await fetchField(t.fallbackFieldEventId); usingSample=f.length>0; }
    FIELD=f.sort((a,b)=>a.localeCompare(b));
  }catch{ FIELD=[]; }
}

// ---------- picker / viewer ----------
function slotHtml(i){
  const isBench=i>=5, tag=isBench?`Bench ${i-4}`:`Starter ${i+1}`, who=selected[i];
  if(who) return `<div class="slot filled ${isBench?'bench':''} ${readonly?'':'editable'}" data-slot="${i}"><span class="tag">${tag}</span><span class="who">${esc(who)}</span>${readonly?'':'<span class="x">×</span>'}</div>`;
  return `<div class="slot ${isBench?'bench':''}"><span class="tag">${tag}</span><span class="empty">${readonly?'—':'tap a player below'}</span></div>`;
}

function renderPicker(){
  whoami();
  const back=`<span class="back" id="back">← All tournaments</span>`;

  // read-only (locked tournament)
  if(readonly){
    const has=selected.some(Boolean);
    const sres=seasonResult(entry.teamName, activeT.key);
    const lockWord = activeT.status==='Final' ? 'is final' : 'has started';
    let body;
    if(has){
      body=`<div class="card"><h2>${esc(activeT.name)} — your roster</h2>
          <div class="slots">${[0,1,2,3,4,5,6].map(slotHtml).join('')}</div></div>
        <div class="card"><h2>Outright winner pick</h2>
          <div style="font-size:16px;font-weight:700">${esc(pick)} <span style="color:var(--green)">${fmtScore(pickScore)}</span></div></div>`;
    } else if(sres!==undefined){
      body=`<div class="card"><h2>${esc(activeT.name)} — final result</h2>
          <div style="font-size:30px;font-weight:800" class="${sres==='DQ'?'':(sres<0?'under':(sres>0?'over':'even'))}">${esc(resStr(sres))}</div>
          <p class="note">Per-golfer picks aren’t on file for this major — this is your final score from the season scoreboard.</p></div>`;
    } else { body=''; }
    const lead = has ? 'Here are the picks you submitted:' : (sres!==undefined ? 'Here’s how you finished:' : 'No entry is on file for this one.');
    app().innerHTML=`${back}
      <div class="banner lock">🔒 <b>${esc(activeT.name)}</b> ${lockWord} — picks are locked. ${lead}</div>${body}`;
    document.getElementById('back').onclick=renderTournaments;
    return;
  }

  if(!FIELD.length){
    app().innerHTML=`${back}<div class="card"><h2>${esc(activeT.name)} — field not available yet</h2>
      <p style="font-size:14px;color:var(--muted);margin:0">The player list for ${esc(activeT.name)} hasn’t been published yet. Come back once the field is announced to make your picks.</p></div>`;
    document.getElementById('back').onclick=renderTournaments;
    return;
  }

  const filled=selected.filter(Boolean).length;
  const sCount=selected.slice(0,5).filter(Boolean).length, bCount=selected.slice(5,7).filter(Boolean).length;
  const ql=q.trim().toLowerCase();
  const list=FIELD.filter(n=>!ql||n.toLowerCase().includes(ql));
  const ready = filled===7 && sCount===5 && bCount===2 && pick && scoreOk();
  const existing = !!entry.picks?.[activeT.key];

  app().innerHTML=`${back}
    <div class="banner info">Submitting for <b>${esc(entry.teamName)}</b> · <b>${esc(activeT.name)}</b>${existing?' — you can update your picks below.':''}</div>
    ${usingSample?`<div class="banner warn">⚠️ The field for ${esc(activeT.name)} isn’t announced yet — showing a <b>sample field</b> so you can try the flow. It’ll switch to the real field automatically once published.</div>`:''}

    <div class="card">
      <h2>Your roster</h2>
      <div class="slots">${[0,1,2,3,4,5,6].map(slotHtml).join('')}</div>
      <div class="counts">Starters ${sCount}/5 · Bench ${bCount}/2 — tap a filled slot to remove.</div>
    </div>

    <div class="card">
      <h2>Outright winner pick</h2>
      <div class="row2">
        <div><label for="pick">Who wins the tournament?</label>
          <select id="pick"><option value="">— select a player —</option>
            ${FIELD.map(n=>`<option value="${esc(n)}" ${n===pick?'selected':''}>${esc(n)}</option>`).join('')}</select></div>
        <div><label for="pickScore">Their winning score (to par)</label>
          <input id="pickScore" type="number" step="1" inputmode="numeric" placeholder="e.g. -11  (0 = E)" value="${pickScore}"></div>
      </div>
    </div>

    <div class="card">
      <h2>Player field — ${FIELD.length} players</h2>
      <input class="search" id="search" type="search" placeholder="Search players…" value="${esc(q)}">
      <div class="plist">${list.map(n=>{
        const sel=selected.includes(n), full=!sel && filled>=7;
        return `<div class="pitem ${sel?'sel':''} ${full?'full':''}" data-name="${esc(n)}">
          <span class="who">${esc(n)}</span>${sel?'<span class="mark">✓ picked</span>':(full?'<span class="note">roster full</span>':'<span class="note">tap to add</span>')}</div>`;
      }).join('')}</div>
    </div>

    <button class="primary" id="submit" ${ready?'':'disabled'}>${existing?'Update my team':'Submit team'}</button>
    <div class="msg" id="msg"></div>
    <p class="note">Demo — email login only, no confirmation yet.</p>`;

  document.getElementById('back').onclick=renderTournaments;
  document.getElementById('pick').onchange=e=>{pick=e.target.value; toggleReady();};
  document.getElementById('pickScore').oninput=e=>{pickScore=e.target.value; toggleReady();};
  const s=document.getElementById('search');
  s.oninput=()=>{ q=s.value; const pos=s.selectionStart; renderPicker(); const ns=document.getElementById('search'); ns.focus(); ns.setSelectionRange(pos,pos); };
  document.querySelectorAll('.pitem').forEach(el=> el.onclick=()=>togglePlayer(el.dataset.name));
  document.querySelectorAll('.slot.filled.editable').forEach(el=> el.onclick=()=>{ selected[+el.dataset.slot]=undefined; compact(); renderPicker(); });
  document.getElementById('submit').onclick=submit;
}
function toggleReady(){
  const filled=selected.filter(Boolean).length;
  const b=document.getElementById('submit'); if(b) b.disabled=!(filled===7 && pick && scoreOk());
}
function togglePlayer(name){
  const i=selected.indexOf(name);
  if(i>=0){ selected[i]=undefined; compact(); }
  else { if(selected.filter(Boolean).length>=7) return; selected[firstEmpty()]=name; }
  renderPicker();
}
function firstEmpty(){ for(let i=0;i<7;i++) if(!selected[i]) return i; return -1; }
function compact(){ const v=selected.filter(Boolean); selected=[...v]; while(selected.length<7) selected.push(undefined); }

async function submit(){
  const msg=document.getElementById('msg'); msg.className='msg'; msg.textContent='Submitting…';
  const payload={ email:entry.email, tournament:activeT.key, starters:selected.slice(0,5), bench:selected.slice(5,7), pick, pickScore:parseInt(pickScore,10) };
  try{
    const r=await fetch('/api/submit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    const d=await r.json();
    if(!d.ok) throw new Error(d.error||'Submission failed');
    entry.picks[activeT.key]={starters:payload.starters,bench:payload.bench,pick,pickScore:payload.pickScore};
    done(payload);
  }catch(e){ msg.className='msg err'; msg.textContent=e.message; }
}
function done(p){
  app().innerHTML=`<div class="card done">
    <div class="big">✅</div><h2>Picks submitted!</h2>
    <p style="color:var(--muted);font-size:14px;margin:0"><b>${esc(entry.teamName)}</b> · ${esc(activeT.name)}</p>
    <div class="summary">
      <div class="li"><b>Starters</b></div>${p.starters.map(n=>`<div class="li"><span>${esc(n)}</span></div>`).join('')}
      <div class="li"><b>Bench</b></div>${p.bench.map(n=>`<div class="li"><span>${esc(n)}</span></div>`).join('')}
      <div class="li"><span><b>Outright winner</b></span><span>${esc(p.pick)} ${fmtScore(p.pickScore)}</span></div>
    </div>
    <p style="margin-top:18px"><span class="back" id="back2">← Back to tournaments</span></p></div>`;
  document.getElementById('back2').onclick=renderTournaments;
}

renderLogin(new URLSearchParams(location.search).get('email') || '');
</script>
</body>
</html>
